# BoundaryValueDiffEqFIRK splits its solver tests by formulation and test file so
# no single CI job has to carry the whole expensive expanded/nested suite.
# runtests.jl dispatches on BOUNDARYVALUEDIFFEQ_TEST_GROUP matching these names.
# QA (Aqua) runs on release + LTS Julia only.
#
# The downgrade workflow passes a uniform "Core" group to every sublibrary;
# runtests.jl maps "Core" to the basic FIRK solve tests of both formulations.
# "Core" is intentionally NOT listed below: those basic tests already run inside
# the split expanded and nested matrix groups, so adding a "Core" matrix entry would
# only duplicate them across the full version matrix.

[EXPANDED_AFFINENESS]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_CONVERGENCE]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_PENDULUM]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_INTERPOLATION]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_NONLINEAR]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_PARAMETERS]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_INITIAL_GUESS]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_NLLS]
versions = ["lts", "1", "pre"]
timeout = 240

[EXPANDED_ENSEMBLE]
