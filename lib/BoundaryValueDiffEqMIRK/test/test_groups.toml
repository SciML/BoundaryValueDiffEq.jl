# Test group matrix for the sublibrary CI discovery (SciML reusable
# sublibrary-project-tests workflow). Each table header is a test group;
# runtests.jl dispatches on BOUNDARYVALUEDIFFEQ_TEST_GROUP matching the name.
#
# Core: the sublibrary's solver tests in test/Core/, run on the base version
# matrix. QA (Aqua) adds extra deps via test/qa/Project.toml, is excluded from
# the default "All" run, and runs on release + LTS Julia only.

[Core]
versions = ["lts", "1", "pre"]

# AD: different-AD-backend (Enzyme/Mooncake) compatibility tests. The heavy
# optional backends live in test/AD/Project.toml (kept out of the main test env so
# the Downgrade lane does not force a joint at-floor resolve of them).
[AD_MULTIPOINT_GRID]
versions = ["lts", "1", "pre"]

[AD_MULTIPOINT_INTERPOLATION]
versions = ["lts", "1", "pre"]

[AD_TWOPOINT]
versions = ["lts", "1", "pre"]

[QA]
versions = ["lts", "1"]
